services:

  redis:
    image: redis:7-alpine
    container_name: workforcehub-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: workforcehub-backend
    ports:
      - "8000:8000"
    #env_file:
    #  - .env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: workforcehub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data: